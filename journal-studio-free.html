<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Journal Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Quicksand:wght@400;500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#FBF6EF; --accent:#F3B8C4; --accent2:#D7C7EC; --sage:#A9C2A0;
    --ink:#5B4636; --gold:#CB9A4B; --page:#FFFDF9;
    --f-display:'Fraunces',serif; --f-body:'Quicksand',sans-serif; --f-hand:'Caveat',cursive;
    --radius:22px; --doodle-op:0.9;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:#EFEAE1;font-family:var(--f-body);color:var(--ink);}

  /* ---------- top studio bar ---------- */
  .studio-header{
    background:var(--page); border-bottom:1px solid #E6DFD3; padding:18px 28px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{width:34px;height:34px;border-radius:50%;background:conic-gradient(from 200deg,var(--accent),var(--accent2),var(--sage),var(--accent));}
  .brand h1{font-family:var(--f-display); font-size:20px; margin:0; font-weight:600; letter-spacing:.2px;}
  .brand span{display:block; font-size:11px; color:#9c8e7d; font-family:var(--f-body); letter-spacing:.5px; text-transform:uppercase;}

  .setup-row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .setup-row input{
    font-family:var(--f-body); font-size:13px; padding:9px 13px; border-radius:12px;
    border:1px solid #E6DFD3; background:#FBF6EF; color:var(--ink); outline:none; min-width:150px;
  }
  .setup-row input:focus{border-color:var(--accent);}

  .presets{display:flex; gap:8px; padding:14px 28px; background:var(--page); flex-wrap:wrap; border-bottom:1px solid #E6DFD3;}
  .preset-btn{
    font-family:var(--f-body); font-weight:600; font-size:12.5px; padding:8px 15px; border-radius:999px;
    border:1.5px solid #E6DFD3; background:#fff; color:var(--ink); cursor:pointer; transition:.15s;
  }
  .preset-btn:hover{border-color:var(--accent); transform:translateY(-1px);}
  .preset-btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  /* ---------- layout ---------- */
  .layout{display:grid; grid-template-columns:1fr 340px; gap:0; align-items:start;}
  .pages-wrap{padding:30px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:26px;}

  .page-card{
    position:relative; background:var(--page); border-radius:14px; overflow:hidden;
    box-shadow:0 10px 30px -14px rgba(70,50,30,.35); border:1px solid #ECE4D6;
  }
  .page-card .label{
    font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#a3947f;
    padding:10px 14px 0 14px; font-weight:700;
  }
  .page-canvas{
    aspect-ratio: 5/7; margin:10px 14px 14px 14px; border-radius:var(--radius);
    background:var(--bg); position:relative; overflow:hidden; padding:26px 22px;
    display:flex; flex-direction:column; border:1px solid rgba(91,70,54,.08);
  }

  /* doodles */
  .doodle{position:absolute; opacity:var(--doodle-op); pointer-events:none;}
  .doodle svg{display:block;}

  /* cover */
  .cover-title{font-family:var(--f-display); font-size:30px; font-weight:600; text-align:center; margin:auto 0 6px 0; line-height:1.15; color:var(--ink); z-index:2;}
  .cover-sub{font-family:var(--f-hand); font-size:19px; text-align:center; color:var(--gold); z-index:2;}
  .cover-badge{
    width:64px;height:64px;border-radius:50%; margin:0 auto 14px auto; z-index:2;
    background:radial-gradient(circle at 35% 30%, #fff8, transparent 60%), var(--accent);
    display:flex;align-items:center;justify-content:center; font-family:var(--f-display); font-size:22px; color:#fff;
    box-shadow:0 6px 16px -6px rgba(0,0,0,.3);
  }
  .cover-frame{position:absolute; inset:12px; border:1.5px solid var(--gold); border-radius:calc(var(--radius) - 8px); opacity:.55; z-index:1;}

  /* inner pages */
  .page-eyebrow{font-family:var(--f-hand); font-size:16px; color:var(--gold); z-index:2;}
  .page-heading{font-family:var(--f-display); font-size:21px; font-weight:600; margin:2px 0 14px 0; z-index:2;}
  .prompt-line{font-size:12.5px; color:var(--ink); opacity:.85; margin:0 0 6px 0; z-index:2;}
  .write-line{border-bottom:1.3px dashed rgba(91,70,54,.35); height:20px; margin-bottom:4px; z-index:2;}
  .block{margin-bottom:14px; z-index:2;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; z-index:2;}
  .tracker-box{border-radius:10px; border:1.3px solid rgba(91,70,54,.25); height:26px; display:flex; align-items:center; justify-content:center; font-size:10px;}
  .tag{display:inline-block; font-size:10.5px; padding:4px 10px; border-radius:999px; background:var(--accent2); color:var(--ink); margin-right:6px; z-index:2; font-weight:600;}
  [contenteditable="true"]{outline:none;}
  [contenteditable="true"]:hover{background:rgba(203,154,75,.08); border-radius:4px;}
  [contenteditable="true"]:focus{background:rgba(203,154,75,.15); border-radius:4px;}

  .page-num{position:absolute; bottom:10px; right:16px; font-family:var(--f-hand); font-size:13px; color:var(--gold); opacity:.8; z-index:2;}

  /* ---------- sidebar ---------- */
  .sidebar{position:sticky; top:0; height:100vh; background:var(--page); border-left:1px solid #E6DFD3; padding:22px; display:flex; flex-direction:column;}
  .sidebar h3{font-family:var(--f-display); font-size:16px; margin:0 0 4px 0;}
  .sidebar p.hint{font-size:12px; color:#9c8e7d; margin:0 0 16px 0; line-height:1.5;}
  .chat-log{flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:12px; min-height:120px;}
  .msg{font-size:13px; padding:10px 13px; border-radius:14px; line-height:1.4;}
  .msg.user{background:var(--accent2); align-self:flex-end; border-bottom-right-radius:4px;}
  .msg.ai{background:#F2EEE4; align-self:flex-start; border-bottom-left-radius:4px;}
  .msg.ai.loading{color:#a3947f; font-style:italic;}
  .chat-input-row{display:flex; gap:8px;}
  .chat-input-row input{
    flex:1; font-family:var(--f-body); font-size:13px; padding:11px 14px; border-radius:14px;
    border:1.5px solid #E6DFD3; outline:none; background:#FBF6EF;
  }
  .chat-input-row input:focus{border-color:var(--accent);}
  .send-btn{
    border:none; background:var(--ink); color:#fff; width:42px; border-radius:14px; cursor:pointer; font-size:16px;
  }
  .chip-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;}
  .chip{
    font-size:11px; padding:6px 10px; border-radius:999px; background:#F2EEE4; border:1px solid #E6DFD3;
    cursor:pointer; color:var(--ink);
  }
  .chip:hover{background:var(--accent2);}
  .download-btn{
    margin-top:14px; border:none; padding:15px; border-radius:14px; background:linear-gradient(135deg,var(--ink),#3f312a);
    color:#fff; font-family:var(--f-body); font-weight:700; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .download-btn:hover{opacity:.92;}
  .download-btn:disabled{opacity:.6; cursor:wait;}

  @media(max-width:900px){ .layout{grid-template-columns:1fr;} .sidebar{position:static; height:auto;} }
</style>
</head>
<body>

<div class="studio-header">
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <h1 id="journalTitleDisplay">Bloom & Breathe</h1>
      <span>Journal Studio · draft</span>
    </div>
  </div>
  <div class="setup-row">
    <input id="titleInput" placeholder="Journal title" value="Bloom &amp; Breathe">
    <input id="subInput" placeholder="Subtitle / tagline" value="a gentle 30-day self-reflection journal">
    <input id="ownerInput" placeholder="Made for / by (optional)">
  </div>
</div>

<div class="presets" id="presetRow"></div>

<div class="layout">
  <div class="pages-wrap" id="pagesWrap"></div>

  <div class="sidebar">
    <h3>Edit with chat ✏️</h3>
    <p class="hint">Tell me what to change — style, color, doodles, mood. I'll update every page live.</p>
    <div class="chip-row">
      <div class="chip" onclick="quickChat('Make it more cute with more doodles')">more cute</div>
      <div class="chip" onclick="quickChat('Make it pastel and soft')">pastel</div>
      <div class="chip" onclick="quickChat('Make it feel luxury and elegant')">luxury</div>
      <div class="chip" onclick="quickChat('Add floral decorations')">florals</div>
      <div class="chip" onclick="quickChat('Make it minimalist with more whitespace')">minimalist</div>
    </div>
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="e.g. add doodles, make it feminine..." onkeydown="if(event.key==='Enter')sendChat();">
      <button class="send-btn" onclick="sendChat()">→</button>
    </div>
    <button class="download-btn" id="downloadBtn" onclick="exportPDF()">⬇ Download PDF</button>
  </div>
</div>

<script>
/* ---------------- design tokens & presets ---------------- */
const presets = {
  cute:      {label:"Cute",        bg:"#FFF6F8", accent:"#F6B8C4", accent2:"#FFD9E8", ink:"#6B4C4F", gold:"#EE9A6B", doodle:"hearts",  density:3, radius:26, fd:"'Fraunces',serif", fw:600},
  aesthetic: {label:"Aesthetic",   bg:"#FBF6EF", accent:"#A9C2A0", accent2:"#D7C7EC", ink:"#5B4636", gold:"#CB9A4B", doodle:"floral",  density:2, radius:22, fd:"'Fraunces',serif", fw:500},
  feminine:  {label:"Feminine",    bg:"#FDF4F7", accent:"#E7A9BB", accent2:"#F5D0DD", ink:"#55343D", gold:"#D8A657", doodle:"floral",  density:3, radius:28, fd:"'Fraunces',serif", fw:500},
  minimalist:{label:"Minimalist",  bg:"#FAFAF8", accent:"#D8D3C8", accent2:"#EDEAE2", ink:"#33312C", gold:"#B7A98C", doodle:"minimal", density:1, radius:10, fd:"'Fraunces',serif", fw:300},
  luxury:    {label:"Luxury",      bg:"#F3ECDF", accent:"#C9A24B", accent2:"#E4D6B8", ink:"#2B2320", gold:"#C9A24B", doodle:"minimal", density:1, radius:8,  fd:"'Fraunces',serif", fw:600},
  playful:   {label:"Playful",     bg:"#FFF9EC", accent:"#F3B8C4", accent2:"#A9C2A0", ink:"#4A3B2A", gold:"#E0743C", doodle:"stars",   density:3, radius:24, fd:"'Fraunces',serif", fw:600},
};

let tokens = {...presets.aesthetic};
let journal = {title:"Bloom & Breathe", sub:"a gentle 30-day self-reflection journal", owner:""};

/* ---------------- doodle svg generator ---------------- */
function doodleSVG(kind, size=40, color="var(--gold)"){
  const c = color;
  if(kind==="hearts") return `<svg width="${size}" height="${size}" viewBox="0 0 40 40"><path d="M20 34 C6 24 4 14 12 10 C17 7.5 20 12 20 14 C20 12 23 7.5 28 10 C36 14 34 24 20 34Z" fill="${c}" opacity="0.85"/></svg>`;
  if(kind==="floral") return `<svg width="${size}" height="${size}" viewBox="0 0 40 40"><g fill="${c}" opacity="0.85"><circle cx="20" cy="12" r="6"/><circle cx="28" cy="20" r="6"/><circle cx="20" cy="28" r="6"/><circle cx="12" cy="20" r="6"/></g><circle cx="20" cy="20" r="4.5" fill="var(--accent)"/></svg>`;
  if(kind==="stars") return `<svg width="${size}" height="${size}" viewBox="0 0 40 40"><path d="M20 4 L23 16 L36 16 L25 23 L29 36 L20 28 L11 36 L15 23 L4 16 L17 16 Z" fill="${c}" opacity="0.85"/></svg>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40"><circle cx="20" cy="20" r="3" fill="${c}" opacity="0.7"/></svg>`;
}

function scatterDoodles(){
  const positions = [
    {top:'8px',left:'8px',rot:-12}, {top:'8px',right:'8px',rot:14},
    {bottom:'10px',left:'10px',rot:8}, {bottom:'10px',right:'10px',rot:-16}
  ];
  const count = tokens.density;
  let html = '';
  for(let i=0;i<count && i<positions.length;i++){
    const p = positions[i];
    const style = Object.entries(p).filter(([k])=>k!=='rot').map(([k,v])=>`${k}:${v}`).join(';');
    html += `<div class="doodle" style="${style};transform:rotate(${p.rot}deg)">${doodleSVG(tokens.doodle, 34+ (i%2?6:0))}</div>`;
  }
  return html;
}

/* ---------------- page templates ---------------- */
function pageCover(num){
  return `
  <div class="page-canvas" style="border-radius:${tokens.radius}px;">
    <div class="cover-frame" style="border-radius:${Math.max(tokens.radius-8,4)}px;"></div>
    ${scatterDoodles()}
    <div style="margin:auto;display:flex;flex-direction:column;align-items:center;">
      <div class="cover-badge">✦</div>
      <div class="cover-title" contenteditable="true">${journal.title}</div>
      <div class="cover-sub" contenteditable="true">${journal.sub}</div>
      ${journal.owner ? `<div class="cover-sub" style="margin-top:6px;font-size:14px;" contenteditable="true">${journal.owner}</div>` : ''}
    </div>
  </div>`;
}

function pageReflection(num, prompt){
  return `
  <div class="page-canvas" style="border-radius:${tokens.radius}px;">
    ${scatterDoodles()}
    <div class="page-eyebrow" contenteditable="true">Reflection · Day ${num}</div>
    <div class="page-heading" contenteditable="true">Today I noticed...</div>
    <div class="prompt-line" contenteditable="true">${prompt}</div>
    <div class="block">
      ${Array(6).fill('<div class="write-line"></div>').join('')}
    </div>
    <div class="tag">mood</div><div class="tag">energy</div>
    <div class="page-num">${num}</div>
  </div>`;
}

function pageGratitude(num){
  return `
  <div class="page-canvas" style="border-radius:${tokens.radius}px;">
    ${scatterDoodles()}
    <div class="page-eyebrow" contenteditable="true">Gratitude</div>
    <div class="page-heading" contenteditable="true">Three good things</div>
    <div class="block">
      <div class="prompt-line" contenteditable="true">1. I'm grateful for...</div><div class="write-line"></div>
      <div class="prompt-line" contenteditable="true">2. I'm grateful for...</div><div class="write-line"></div>
      <div class="prompt-line" contenteditable="true">3. I'm grateful for...</div><div class="write-line"></div>
    </div>
    <div class="page-heading" style="font-size:16px;margin-top:4px;" contenteditable="true">A small win today</div>
    <div class="write-line"></div><div class="write-line"></div>
    <div class="page-num">${num}</div>
  </div>`;
}

function pageWellness(num){
  return `
  <div class="page-canvas" style="border-radius:${tokens.radius}px;">
    ${scatterDoodles()}
    <div class="page-eyebrow" contenteditable="true">Wellness check-in</div>
    <div class="page-heading" contenteditable="true">How's my body & mind?</div>
    <div class="block">
      <div class="prompt-line">Water</div>
      <div class="grid3">${Array(3).fill('<div class="tracker-box">◯</div>').join('')}</div>
    </div>
    <div class="block">
      <div class="prompt-line">Sleep hours</div>
      <div class="grid3"><div class="tracker-box">&lt;6</div><div class="tracker-box">7-8</div><div class="tracker-box">9+</div></div>
    </div>
    <div class="block">
      <div class="prompt-line" contenteditable="true">One thing my body needs today:</div>
      <div class="write-line"></div>
    </div>
    <div class="page-num">${num}</div>
  </div>`;
}

function pageNotes(num){
  return `
  <div class="page-canvas" style="border-radius:${tokens.radius}px;">
    ${scatterDoodles()}
    <div class="page-eyebrow" contenteditable="true">Notes</div>
    <div class="page-heading" contenteditable="true">Free space</div>
    <div class="block">
      ${Array(10).fill('<div class="write-line"></div>').join('')}
    </div>
    <div class="page-num">${num}</div>
  </div>`;
}

const pageDefs = [
  {type:'cover', label:'Cover'},
  {type:'reflection', label:'Reflection · Morning', prompt:"What's the first feeling I noticed when I woke up?"},
  {type:'reflection', label:'Reflection · Evening', prompt:"What moment from today am I still thinking about?"},
  {type:'gratitude', label:'Gratitude'},
  {type:'wellness', label:'Wellness'},
  {type:'notes', label:'Notes'},
];

function renderPages(){
  document.documentElement.style.setProperty('--bg', tokens.bg);
  document.documentElement.style.setProperty('--accent', tokens.accent);
  document.documentElement.style.setProperty('--accent2', tokens.accent2);
  document.documentElement.style.setProperty('--ink', tokens.ink);
  document.documentElement.style.setProperty('--gold', tokens.gold);
  document.documentElement.style.setProperty('--radius', tokens.radius+'px');
  document.documentElement.style.setProperty('--doodle-op', tokens.density>0?0.9:0);

  const wrap = document.getElementById('pagesWrap');
  wrap.innerHTML = pageDefs.map((p, i) => {
    let inner = '';
    if(p.type==='cover') inner = pageCover(i);
    else if(p.type==='reflection') inner = pageReflection(i, p.prompt);
    else if(p.type==='gratitude') inner = pageGratitude(i);
    else if(p.type==='wellness') inner = pageWellness(i);
    else if(p.type==='notes') inner = pageNotes(i);
    return `<div class="page-card"><div class="label">${p.label}</div>${inner}</div>`;
  }).join('');

  document.getElementById('journalTitleDisplay').textContent = journal.title;
}

/* ---------------- presets UI ---------------- */
function renderPresetRow(){
  const row = document.getElementById('presetRow');
  row.innerHTML = Object.entries(presets).map(([key,p]) =>
    `<button class="preset-btn" data-key="${key}" onclick="applyPreset('${key}')">${p.label}</button>`
  ).join('');
  markActivePreset('aesthetic');
}
function markActivePreset(key){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active', b.dataset.key===key));
}
function applyPreset(key){
  tokens = {...presets[key]};
  markActivePreset(key);
  renderPages();
}

/* ---------------- setup inputs ---------------- */
document.getElementById('titleInput').addEventListener('input', e=>{journal.title=e.target.value; renderPages();});
document.getElementById('subInput').addEventListener('input', e=>{journal.sub=e.target.value; renderPages();});
document.getElementById('ownerInput').addEventListener('input', e=>{journal.owner=e.target.value; renderPages();});

/* ---------------- chat editing via Claude API ---------------- */
function addMsg(text, cls){
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function quickChat(text){
  document.getElementById('chatInput').value = text;
  sendChat();
}

async function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  addMsg(text, 'user');

  const t = text.toLowerCase();
  let matched = null;
  if(t.includes('cute')) matched = 'cute';
  else if(t.includes('pastel') || t.includes('soft')) matched = 'aesthetic';
  else if(t.includes('luxury') || t.includes('elegant')) matched = 'luxury';
  else if(t.includes('floral') || t.includes('flower') || t.includes('feminine')) matched = 'feminine';
  else if(t.includes('minimal') || t.includes('whitespace')) matched = 'minimalist';
  else if(t.includes('playful') || t.includes('fun')) matched = 'playful';

  if(t.includes('doodle') || t.includes('decoration')){
    tokens.density = Math.min(4, tokens.density + 1);
  }

  setTimeout(()=>{
    if(matched){
      tokens = {...presets[matched]};
      markActivePreset(matched);
      renderPages();
      addMsg(`done! switched to a ${presets[matched].label.toLowerCase()} style ✨`, 'ai');
    } else {
      renderPages();
      addMsg("try words like 'cute', 'pastel', 'luxury', 'floral', 'minimalist' or 'add doodles' — that's what this free version understands. A smarter version is coming soon!", 'ai');
    }
  }, 300);
}

/* ---------------- PDF export ---------------- */
async function exportPDF(){
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  btn.textContent = 'Preparing PDF...';

  const { jsPDF } = window.jspdf;
  const cards = document.querySelectorAll('.page-canvas');
  const pdf = new jsPDF({unit:'pt', format:[420, 588]}); // 5:7 ratio page

  for(let i=0;i<cards.length;i++){
    btn.textContent = `Rendering page ${i+1}/${cards.length}...`;
    const canvas = await html2canvas(cards[i], {scale:3, backgroundColor:null});
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    if(i>0) pdf.addPage([420,588]);
    pdf.addImage(imgData, 'JPEG', 0, 0, 420, 588);
    if(i>0){
      pdf.setFontSize(9);
      pdf.setTextColor(150);
      pdf.text(String(i), 410, 578, {align:'right'});
    }
  }

  pdf.save(`${journal.title.replace(/[^a-z0-9]/gi,'-') || 'journal'}.pdf`);
  btn.disabled = false;
  btn.innerHTML = '⬇ Download PDF';
}

/* ---------------- init ---------------- */
renderPresetRow();
renderPages();
addMsg("Hi! I'm your design assistant. Try 'make it more cute' or click a chip below.", 'ai');
</script>
</body>
</html>
